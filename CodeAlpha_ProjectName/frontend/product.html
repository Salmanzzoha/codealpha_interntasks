<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Details — ShopEase</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="brand">🛒 ShopEase</a>
    <div class="nav-links">
      <a href="cart.html">Cart <span class="cart-badge" id="cart-count"></span></a>
      <div id="auth-links" class="nav-links"></div>
    </div>
  </div>
</nav>

<main class="page container">
  <div id="alert-box"></div>
  <div id="product-container"></div>
</main>

<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  const alertBox = document.getElementById("alert-box");
  const container = document.getElementById("product-container");
  const productId = new URLSearchParams(window.location.search).get("id");

  function showAlert(message, type = "error") {
    alertBox.innerHTML = `<div class="alert ${type}">${message}</div>`;
  }

  async function loadProduct() {
    if (!productId) {
      showAlert("No product specified.");
      return;
    }
    try {
      const p = await api.get(`/products/${productId}`);
      container.innerHTML = `
        <div class="product-detail">
          <img src="${p.image_url || "https://via.placeholder.com/500x400?text=No+Image"}" alt="${escapeHtml(p.name)}" />
          <div>
            <span class="category-tag">${escapeHtml(p.category || "")}</span>
            <h1>${escapeHtml(p.name)}</h1>
            <p>${escapeHtml(p.description || "")}</p>
            <div class="price">$${p.price.toFixed(2)}</div>
            <div class="stock-note ${p.stock === 0 ? "low" : ""}">
              ${p.stock === 0 ? "Out of stock" : `${p.stock} in stock`}
            </div>
            <div class="qty-row">
              <label for="qty" style="margin:0;">Qty</label>
              <input type="number" id="qty" value="1" min="1" max="${p.stock}" ${p.stock === 0 ? "disabled" : ""} />
            </div>
            <button id="add-to-cart-btn" ${p.stock === 0 ? "disabled" : ""}>Add to Cart</button>
          </div>
        </div>
      `;

      document.getElementById("add-to-cart-btn")?.addEventListener("click", async () => {
        const qty = parseInt(document.getElementById("qty").value, 10) || 1;
        try {
          await api.post("/cart", { productId: p.id, quantity: qty });
          showAlert("Added to cart!", "success");
          updateCartBadge();
        } catch (err) {
          if (err.message.includes("logged in")) {
            window.location.href = "login.html";
            return;
          }
          showAlert(err.message);
        }
      });
    } catch (err) {
      showAlert(err.message);
    }
  }

  loadProduct();
</script>
</body>
</html>
