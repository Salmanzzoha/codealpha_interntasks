<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Task Manager</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="auth-view" class="container">
    <div class="card">
      <h1>📋 Task Manager</h1>

      <div class="tabs">
        <button id="tab-login" class="tab active">Login</button>
        <button id="tab-register" class="tab">Register</button>
      </div>

      <form id="login-form" class="form">
        <input type="email" id="login-email" placeholder="Email" required />
        <input type="password" id="login-password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <form id="register-form" class="form hidden">
        <input type="text" id="register-name" placeholder="Full name" required />
        <input type="email" id="register-email" placeholder="Email" required />
        <input type="password" id="register-password" placeholder="Password (min 6 chars)" required />
        <button type="submit">Create account</button>
      </form>

      <p id="auth-error" class="error"></p>
    </div>
  </div>

  <div id="app-view" class="container hidden">
    <div class="card wide">
      <div class="header-row">
        <h1>📋 My Tasks</h1>
        <div>
          <span id="user-name"></span>
          <button id="logout-btn" class="secondary">Logout</button>
        </div>
      </div>

      <form id="task-form" class="form-inline">
        <input type="text" id="task-title" placeholder="Task title" required />
        <input type="text" id="task-desc" placeholder="Description (optional)" />
        <button type="submit">Add Task</button>
      </form>

      <p id="task-error" class="error"></p>

      <ul id="task-list" class="task-list"></ul>
      <p id="empty-msg" class="empty hidden">No tasks yet. Add one above!</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
