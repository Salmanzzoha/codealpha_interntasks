<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feedback Board</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrap">
    <div class="card form-card">
      <h1>💬 Feedback Board</h1>
      <p class="subtitle">Share your thoughts — no account needed.</p>

      <form id="feedback-form" class="form">
        <input type="text" id="name" placeholder="Your name" required maxlength="60" />
        <textarea id="message" placeholder="Your feedback..." required maxlength="500" rows="3"></textarea>

        <div class="rating-picker">
          <span class="rating-label">Rating:</span>
          <div id="stars" class="stars">
            <span data-value="1">★</span>
            <span data-value="2">★</span>
            <span data-value="3">★</span>
            <span data-value="4">★</span>
            <span data-value="5">★</span>
          </div>
        </div>

        <button type="submit">Submit Feedback</button>
        <p id="form-error" class="error"></p>
      </form>
    </div>

    <div class="card list-card">
      <div class="list-header">
        <h2>All Feedback</h2>
        <select id="sort-select">
          <option value="date">Newest</option>
          <option value="rating">Highest Rated</option>
          <option value="upvotes">Most Upvoted</option>
        </select>
      </div>

      <div id="feedback-list" class="feedback-list"></div>
      <p id="empty-msg" class="empty hidden">No feedback yet. Be the first!</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
